<!DOCTYPE html>
<html lang="pt-BR" class="semJs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platinadores</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script>
      const temaSalvo = localStorage.getItem("tema");
      if (temaSalvo && temaSalvo.toLowerCase() === "escuro") {
        document.documentElement.classList.add("modoEscuro");
      }
      document.documentElement.classList.remove("semJs");
    </script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <div id="topo"></div>

    <header class="BarraNavegacao">
      <div class="ConteudoBarraNavegacao">
        <div class="GrupoBarraNavegacao">
          <div class="GrupoAcoesEsquerda">
            <a href="main.html" class="LinkInicio" aria-label="Ir para o início">
              <button id="botaoInicio" type="button">
                <i class="bi bi-house"></i>
              </button>
            </a>
          </div>
          <div class="AreaPesquisaNav">
            <div class="CampoPesquisaNav">
              <i class="bi bi-search" aria-hidden="true"></i>
              <input
                type="search"
                id="campoPesquisaJogos"
                placeholder="Pesquisar jogos…"
                autocomplete="off"
                enterkeyhint="search"
                aria-label="Pesquisar jogos por nome"
              />
            </div>
          </div>
          <div class="GrupoAcoesDireita">
            <button id="botaoLogin" class="BotaoSecundario" type="button">
              <i class="bi bi-box-arrow-in-right"></i>
              Login
            </button>
            <button id="botaoTema" class="BotaoTema" type="button">
              Modo escuro
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="ConteudoPrincipal">
      <section class="Perfil" aria-label="Perfil">
        <div class="CabecalhoPerfil">
          <button
            id="botaoMenuPerfil"
            class="BotaoMenuCard"
            type="button"
            aria-label="Abrir ações do perfil"
          >
            <i class="bi bi-three-dots"></i>
          </button>
          <img
            id="imagemPerfil"
            src=""
            alt="Imagem do perfil"
            class="ImagemPerfil"
          />
          <div class="InfoPerfil">
            <h1 id="nomePerfil" class="NomePerfil">Nome Perfil</h1>
          </div>
        </div>
      </section>

      <section class="SecaoJogos" aria-label="Jogos">
        <div class="AreaBotaoAdicionar">
          <h2 class="TituloConquistas">Jogos</h2>
          <button id="botaoAbrirAdicionarJogo" class="BotaoAcao" type="button">
            <i class="fas fa-plus"></i>
            Adicionar jogo
          </button>
        </div>
        <div id="listaJogos" class="ListaJogos"></div>
      </section>
    </main>

    <dialog id="janelaAdicionarJogo" class="JanelaModal">
      <form id="formAdicionarJogo" method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Adicionar jogo</h2>
          <button
            id="botaoFecharAdicionarJogo"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de adicionar jogo"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="CampoFormulario">
          <label for="campoNomeNovoJogo">Nome do jogo</label>
          <input
            type="text"
            id="campoNomeNovoJogo"
            maxlength="25"
            required
            placeholder="Digite o nome do jogo"
          />
          <p id="mensagemNomeNovoJogo" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="CampoFormulario">
          <label for="campoImagemNovoJogo">Imagem do jogo</label>
          <input
            type="file"
            id="campoImagemNovoJogo"
            accept=".jpeg, .jpg, .png"
            required
          />
          <p id="mensagemImagemNovoJogo" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="AcoesModal">
          <button class="BotaoConfirmar" type="submit">Salvar jogo</button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaEditarPerfil" class="JanelaModal">
      <form id="formEditarPerfil" method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Editar perfil</h2>
          <button
            id="botaoFecharEditarPerfil"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de editar perfil"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="CampoFormulario">
          <label for="campoNomePerfil">Nome do perfil</label>
          <input
            id="campoNomePerfil"
            type="text"
            maxlength="20"
            placeholder="Digite o novo nome"
          />
          <p id="mensagemNomePerfil" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="CampoFormulario">
          <label for="campoImagemPerfil">Imagem do perfil</label>
          <input
            id="campoImagemPerfil"
            type="file"
            accept=".jpg,.jpeg,.png"
          />
        </div>

        <div class="AcoesModal">
          <button id="botaoSalvarPerfil" class="BotaoConfirmar" type="submit">
            Salvar alterações
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaAcoesPerfil" class="JanelaModal JanelaAcoesPerfil">
      <form method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Ações do perfil</h2>
          <button
            id="botaoFecharAcoesPerfil"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de ações do perfil"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="AcoesModal AcoesPerfilModal">
          <button id="botaoAbrirEditarPerfilModal" class="BotaoAcaoJogoModal" type="button">
            Editar
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaEditarJogo" class="JanelaModal">
      <form id="formEditarJogo" method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Editar jogo</h2>
          <button
            id="botaoFecharEditarJogo"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de editar jogo"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="CampoFormulario">
          <label for="campoNomeEditarJogo">Nome do jogo</label>
          <input
            id="campoNomeEditarJogo"
            type="text"
            maxlength="25"
            placeholder="Digite o novo nome do jogo"
          />
          <p id="mensagemNomeEditarJogo" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="CampoFormulario">
          <label for="campoImagemEditarJogo">Imagem do jogo</label>
          <input
            id="campoImagemEditarJogo"
            type="file"
            accept=".jpg,.jpeg,.png"
          />
        </div>

        <div class="AcoesModal">
          <button id="botaoSalvarJogo" class="BotaoConfirmar" type="submit">
            Salvar alterações
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaAcoesJogo" class="JanelaModal JanelaAcoesJogo">
      <form method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Ações do jogo</h2>
          <button
            id="botaoFecharAcoesJogo"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de ações do jogo"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="AcoesModal AcoesJogoModal">
          <button id="botaoAbrirEditarJogo" class="BotaoAcaoJogoModal" type="button">
            Editar
          </button>
          <button id="botaoRemoverJogoModal" class="BotaoAcaoJogoModal BotaoRemoverJogoModal" type="button">
            Remover
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaEditarTrofeu" class="JanelaModal">
      <form id="formEditarTrofeu" method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Editar troféu</h2>
          <button
            id="botaoFecharEditarTrofeu"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de editar troféu"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="CampoFormulario">
          <label for="campoNomeEditarTrofeu">Nome do troféu</label>
          <input
            type="text"
            id="campoNomeEditarTrofeu"
            required
            placeholder="Digite o nome do troféu"
          />
          <p id="mensagemNomeEditarTrofeu" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="CampoFormulario">
          <label for="campoImagemEditarTrofeu">Imagem do troféu</label>
          <input
            type="file"
            id="campoImagemEditarTrofeu"
            accept=".jpeg, .jpg, .png"
          />
        </div>

        <div class="CampoFormulario">
          <label for="campoDescricaoEditarTrofeu">Descrição do troféu</label>
          <textarea
            id="campoDescricaoEditarTrofeu"
            required
            placeholder="Digite a descrição do troféu"
          ></textarea>
          <p id="mensagemDescricaoEditarTrofeu" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="AcoesModal">
          <button id="botaoSalvarTrofeuEdicao" class="BotaoConfirmar" type="submit">
            Salvar alterações
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaAcoesTrofeu" class="JanelaModal JanelaAcoesJogo">
      <form method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Ações do troféu</h2>
          <button
            id="botaoFecharAcoesTrofeu"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de ações do troféu"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="AcoesModal AcoesJogoModal">
          <button id="botaoAbrirEditarTrofeu" class="BotaoAcaoJogoModal" type="button">
            Editar
          </button>
          <button id="botaoRemoverTrofeuModal" class="BotaoAcaoJogoModal BotaoRemoverJogoModal" type="button">
            Remover
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaTrofeus" class="JanelaModal JanelaTrofeus">
      <form method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2 id="tituloJanelaTrofeus">Troféus</h2>
          <button
            id="botaoFecharTrofeus"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de troféus"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div id="listaTrofeus" class="ListaTrofeus"></div>

        <div class="AcoesModal AcoesTrofeus">
          <button id="botaoAbrirAdicionarTrofeu" type="button">
            <i class="bi bi-plus-circle"></i>
            Adicionar troféu
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaAdicionarTrofeu" class="JanelaModal">
      <form id="formAdicionarTrofeu" method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2>Adicionar troféu</h2>
          <button
            id="botaoFecharAdicionarTrofeu"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de adicionar troféu"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <div class="CampoFormulario">
          <label for="campoNomeTrofeu">Nome do troféu</label>
          <input
            type="text"
            id="campoNomeTrofeu"
            required
            placeholder="Digite o nome do troféu"
          />
          <p id="mensagemNomeTrofeu" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="CampoFormulario">
          <label for="campoImagemTrofeu">Imagem do troféu</label>
          <input
            type="file"
            id="campoImagemTrofeu"
            accept=".jpeg, .jpg, .png"
            required
          />
          <p id="mensagemImagemTrofeu" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="CampoFormulario">
          <label for="campoDescricaoTrofeu">Descrição do troféu</label>
          <textarea
            id="campoDescricaoTrofeu"
            required
            placeholder="Digite a descrição do troféu"
          ></textarea>
          <p id="mensagemDescricaoTrofeu" class="MensagemCampo" aria-live="polite"></p>
        </div>

        <div class="AcoesModal">
          <button id="botaoSalvarTrofeu" class="BotaoConfirmar" type="submit">
            Salvar troféu
          </button>
        </div>
      </form>
    </dialog>

    <dialog id="janelaConfirmacaoExclusao" class="JanelaModal JanelaConfirmacaoExclusao">
      <form method="dialog" class="FormularioModal">
        <div class="TopoModal">
          <h2 id="tituloConfirmacaoExclusao">Confirmar exclusão</h2>
          <button
            id="botaoFecharConfirmacaoExclusao"
            class="BotaoFechar"
            type="button"
            aria-label="Fechar modal de confirmação de exclusão"
          >
            <i class="bi bi-x"></i>
          </button>
        </div>

        <p id="mensagemConfirmacaoExclusao" class="MensagemConfirmacaoExclusao">
          Tem certeza que deseja excluir este item?
        </p>

        <div class="AcoesModal AcoesConfirmacaoExclusao">
          <button id="botaoCancelarConfirmacaoExclusao" class="BotaoAcaoJogoModal" type="button">
            Cancelar
          </button>
          <button id="botaoConfirmarExclusao" class="BotaoAcaoJogoModal BotaoConfirmarExclusao" type="button">
            Excluir
          </button>
        </div>
      </form>
    </dialog>

    <footer class="Rodape">
      <a href="#topo" class="LinkTopo">Voltar ao topo</a>
    </footer>
  </body>
</html>
