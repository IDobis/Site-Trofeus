<!DOCTYPE html>
<html lang="pt-BR" class="semJs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • Platinadores</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="login.css" />
    <script>
      const temaSalvo = localStorage.getItem("tema");
      if (temaSalvo && temaSalvo.toLowerCase() === "escuro") {
        document.documentElement.classList.add("modoEscuro");
      }
      document.documentElement.classList.remove("semJs");
    </script>
    <script defer src="../js/authLocal.js"></script>
    <script defer src="login.js"></script>
  </head>
  <body>
    <header class="BarraTopoLogin">
      <a href="../index.html" class="MarcaLogin" aria-label="Voltar para a página inicial">
        <i class="bi bi-trophy-fill" aria-hidden="true"></i>
        <span>PLATINADORES</span>
      </a>
    </header>

    <main class="PaginaLogin">
      <section class="PainelFormulario" aria-labelledby="tituloLogin">
        <div class="ConteudoFormulario">
          <div id="painelSessaoAtiva" class="PainelSessaoAtiva" hidden>
            <p class="TextoSessaoAtiva">
              Sessão ativa: <strong id="rotuloSessaoAtiva"></strong>
            </p>
            <a href="../index.html" class="BotaoPrimarioLogin BotaoIrSite">
              <span>Ir ao Platinadores</span>
              <i class="bi bi-arrow-right" aria-hidden="true"></i>
            </a>
            <button type="button" id="botaoSairPainelSessao" class="BotaoSairLocal">
              Sair desta conta
            </button>
          </div>

          <div id="blocoFormularioLogin" data-modo="login">
          <h1 id="tituloLogin" class="TituloLogin">Efetue login no Platinadores</h1>
          <p class="SubtituloLogin">
            <span id="subtituloAntes">Não tem uma conta? </span>
            <button
              type="button"
              class="LinkDestaque BotaoComoLink"
              id="alternarModoCadastro"
              aria-expanded="false"
              aria-controls="camposCadastroExtras"
            >
              Crie sua conta
            </button>
          </p>

          <form class="FormularioLogin" novalidate>
            <p id="mensagemFormularioLogin" class="MensagemFormulario" role="alert"></p>

            <div id="camposCadastroExtras" class="GridCadastroExtras" hidden>
              <div class="GrupoCampo">
                <label for="campoEmailCadastro" class="RotuloCampo">E-mail</label>
                <input
                  id="campoEmailCadastro"
                  name="emailCadastro"
                  type="email"
                  class="EntradaCampo"
                  autocomplete="email"
                />
              </div>
              <div class="GrupoCampo">
                <label for="campoPrimeiroNome" class="RotuloCampo">Primeiro nome</label>
                <input
                  id="campoPrimeiroNome"
                  name="primeiroNome"
                  type="text"
                  class="EntradaCampo"
                  autocomplete="given-name"
                />
              </div>
              <div class="GrupoCampo">
                <label for="campoSobrenome" class="RotuloCampo">Sobrenome</label>
                <input
                  id="campoSobrenome"
                  name="sobrenome"
                  type="text"
                  class="EntradaCampo"
                  autocomplete="family-name"
                />
              </div>
            </div>

            <div class="GrupoCampo">
              <label for="campoNomeUsuario" class="RotuloCampo">
                <span id="rotuloCampoUsuario">Nome de usuário</span>
              </label>
              <input
                id="campoNomeUsuario"
                name="nomeUsuario"
                type="text"
                class="EntradaCampo"
                autocomplete="username"
                required
                maxlength="32"
              />
            </div>
            <div class="GrupoCampo">
              <label for="campoSenha" class="RotuloCampo">Senha</label>
              <div class="EnvoltorioSenha">
                <input
                  id="campoSenha"
                  name="senha"
                  type="password"
                  class="EntradaCampo EntradaSenhaComOlho"
                  autocomplete="current-password"
                  minlength="4"
                  required
                />
                <button
                  type="button"
                  id="botaoAlternarVisibilidadeSenha"
                  class="BotaoOlhoSenha"
                  aria-label="Mostrar senha"
                  aria-pressed="false"
                >
                  <i class="bi bi-eye" aria-hidden="true"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="BotaoPrimarioLogin">
              <span>Continuar</span>
              <i class="bi bi-arrow-right" aria-hidden="true"></i>
            </button>

            <label class="LinhaLembrar">
              <input type="checkbox" name="lembrar" class="CaixaSelecao" />
              <span>Lembrar-se de mim</span>
              <button
                type="button"
                class="BotaoInfo"
                aria-label="Mais informações sobre lembrar-se de mim"
              >
                <i class="bi bi-info-circle" aria-hidden="true"></i>
              </button>
            </label>

            <div class="DivisorLogin" role="separator">
              <span>Login alternativo</span>
            </div>

            <button type="button" id="botaoGoogleLogin" class="BotaoSecundarioLogin">
              <span>Continuar com Google</span>
              <i class="bi bi-google IconeBotaoLoginExterno" aria-hidden="true"></i>
            </button>
          </form>

          <p class="RodapeFormulario">
            Esqueceu sua senha?
            <button type="button" class="LinkDestaque BotaoComoLink" data-acao="esqueciSenha">
              Como funciona no modo local
            </button>
          </p>
          </div>
        </div>
      </section>

      <aside class="PainelArte" aria-hidden="true">
        <div class="MolduraArte">
          <div class="ImagemArte"></div>
        </div>
      </aside>
    </main>
  </body>
</html>
