<!DOCTYPE html>
<html lang="pt-BR" class="semJs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login • Platinadores</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="login.css" />
    <script>
      const temaSalvo = localStorage.getItem("tema");
      if (temaSalvo && temaSalvo.toLowerCase() === "escuro") {
        document.documentElement.classList.add("modoEscuro");
      }
      document.documentElement.classList.remove("semJs");
    </script>
  </head>
  <body>
    <header class="BarraTopoLogin">
      <a href="../index.html" class="MarcaLogin" aria-label="Voltar para a página inicial">
        <i class="bi bi-trophy-fill" aria-hidden="true"></i>
        <span>PLATINADORES</span>
      </a>
    </header>

    <main class="PaginaLogin">
      <section class="PainelFormulario" aria-labelledby="tituloLogin">
        <div class="ConteudoFormulario">
          <h1 id="tituloLogin" class="TituloLogin">Efetue login no Platinadores</h1>
          <p class="SubtituloLogin">
            Não tem uma conta?
            <a href="#" class="LinkDestaque">Crie sua conta</a>
          </p>

          <form class="FormularioLogin" novalidate>
            <div class="GrupoCampo">
              <label for="campoEmail" class="RotuloCampo">E-mail ou usuário</label>
              <input
                id="campoEmail"
                name="email"
                type="text"
                class="EntradaCampo"
                autocomplete="username"
                required
              />
            </div>

            <button type="submit" class="BotaoPrimarioLogin">
              <span>Continuar</span>
              <i class="bi bi-arrow-right" aria-hidden="true"></i>
            </button>

            <label class="LinhaLembrar">
              <input type="checkbox" name="lembrar" class="CaixaSelecao" />
              <span>Lembrar-se de mim</span>
              <button
                type="button"
                class="BotaoInfo"
                aria-label="Mais informações sobre lembrar-se de mim"
              >
                <i class="bi bi-info-circle" aria-hidden="true"></i>
              </button>
            </label>

            <div class="DivisorLogin" role="separator">
              <span>Login alternativo</span>
            </div>

            <button type="button" class="BotaoSecundarioLogin">
              <span>Continuar com Google</span>
              <svg
                class="IconeGoogle"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 48 48"
                aria-hidden="true"
              >
                <path
                  fill="#FFC107"
                  d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"
                />
                <path
                  fill="#FF3D00"
                  d="M6.3 14.1l6.6 4.8C14.6 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.1z"
                />
                <path
                  fill="#4CAF50"
                  d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"
                />
                <path
                  fill="#1976D2"
                  d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C41 35.7 44 30.3 44 24c0-1.2-.1-2.3-.4-3.5z"
                />
              </svg>
            </button>
          </form>

          <p class="RodapeFormulario">
            Esqueceu sua senha?
            <a href="#" class="LinkDestaque">Entre em contato com o suporte</a>
          </p>
        </div>
      </section>

      <aside class="PainelArte" aria-hidden="true">
        <div class="MolduraArte">
          <div class="ImagemArte"></div>
        </div>
      </aside>
    </main>
  </body>
</html>
